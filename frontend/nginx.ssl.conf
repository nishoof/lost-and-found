server {
    listen 80;
    listen [::]:80;
    server_name qa.lostandfound.dev;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name qa.lostandfound.dev;

    ssl_certificate /etc/letsencrypt/live/qa.lostandfound.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qa.lostandfound.dev/privkey.pem;

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}

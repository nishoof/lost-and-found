services:
  backend:
    image: ${REPO}:backend-${APP_SHA}
    env_file: .env
    expose:
      - "8080"
    environment:
      PORT: 8080
      DB_HOST: ${MYSQL_HOST}
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}

  frontend:
    image: ${REPO}:frontend-${APP_SHA}
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.qa.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

services:
  backend:
    image: ${REPO}:backend-${APP_SHA}
    env_file: .env
    expose:
      - "8080"

  frontend:
    image: ${REPO}:frontend-${APP_SHA}
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.qa.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
